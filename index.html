<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f1117" />
  <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:;" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Contact Directory</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --bg: #0c0e14; --surface: #13161f; --surface2: #1a1e2a;
      --border: #252a38; --accent: #4f8ef7; --accent2: #7c3aed;
      --green: #22d3a5; --text: #e8eaf0; --muted: #8890a8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'DM Sans', Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* HEADER */
    .header { background: linear-gradient(135deg,#0f1117,#161924); border-bottom: 1px solid var(--border); padding: 20px 20px 16px; position: sticky; top: 0; z-index: 100; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .app-title { font-family: 'Syne', Arial, sans-serif; font-size: 22px; font-weight: 800; background: linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .contact-count { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 12px; font-size: 12px; color: var(--muted); font-weight: 500; }
    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.4; pointer-events: none; }
    .search-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 12px 14px 12px 42px; color: var(--text); font-size: 15px; font-family: inherit; outline: none; }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }

    /* FILTERS */
    .filter-row { padding: 12px 20px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; border-bottom: 1px solid var(--border); }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-pill { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-size: 13px; font-family: inherit; cursor: pointer; white-space: nowrap; }
    .filter-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }

    /* CONTENT */
    .content { padding: 16px 20px 40px; }
    .loader { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 16px; }
    .spinner { width: 44px; height: 44px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader p { color: var(--muted); font-size: 14px; }

    /* REFRESH */
    .refresh-btn { width: 36px; height: 36px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--muted); }
    .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }

    /* ERROR */
    .error-box { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); border-radius: 14px; padding: 16px; font-size: 13px; color: #f87171; line-height: 1.8; margin-bottom: 12px; }
    .error-box strong { color: #fca5a5; display: block; margin-bottom: 6px; font-size: 15px; }
    .retry-btn { display: block; width: 100%; padding: 14px; background: linear-gradient(135deg,var(--accent),var(--accent2)); border: none; border-radius: 14px; color: #fff; font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; }

    /* CARDS */
    .contacts-list { display: flex; flex-direction: column; gap: 12px; }
    .contact-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; overflow: hidden; }
    .card-main { padding: 16px 18px; display: flex; align-items: center; gap: 14px; cursor: pointer; }
    .avatar { width: 46px; height: 46px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-family: 'Syne',Arial,sans-serif; font-weight: 700; font-size: 18px; color: #fff; flex-shrink: 0; }
    .card-info { flex: 1; min-width: 0; }
    .card-name { font-family: 'Syne',Arial,sans-serif; font-weight: 700; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-sub { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .chevron { color: var(--muted); transition: transform 0.2s; flex-shrink: 0; }
    .contact-card.open .chevron { transform: rotate(180deg); }
    .card-details { display: none; padding: 0 18px 16px; border-top: 1px solid var(--border); }
    .contact-card.open .card-details { display: block; }
    .drow { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .drow:last-child { border-bottom: none; }
    .dicon { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 15px; }
    .dcontent { flex: 1; min-width: 0; }
    .dlabel { font-size: 10px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; }
    .dvalue { font-size: 14px; color: var(--text); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .abtn { width: 36px; height: 36px; border-radius: 10px; border: none; display: flex; align-items: center; justify-content: center; font-size: 16px; text-decoration: none; flex-shrink: 0; cursor: pointer; }
    .abtn-call { background: rgba(34,211,165,0.15); color: var(--green); }
    .abtn-email { background: rgba(79,142,247,0.15); color: var(--accent); }
    .qactions { display: flex; gap: 8px; padding: 12px 18px 16px; border-top: 1px solid var(--border); }
    .qbtn { flex: 1; padding: 10px 8px; border-radius: 12px; font-size: 13px; font-weight: 500; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px; text-decoration: none; }
    .qbtn-call { border: 1px solid rgba(34,211,165,0.3); background: rgba(34,211,165,0.08); color: var(--green); }
    .qbtn-email { border: 1px solid rgba(79,142,247,0.3); background: rgba(79,142,247,0.08); color: var(--accent); }
    .empty { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 48px; margin-bottom: 16px; }
    .empty-title { font-family: 'Syne',Arial,sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 8px; }
    .empty-desc { color: var(--muted); font-size: 14px; }
    .debug-log { font-size: 11px; color: var(--muted); background: var(--surface2); border-radius: 10px; padding: 10px; margin-top: 10px; word-break: break-all; line-height: 1.6; }
  </style>
</head>
<body>

<div class="header" id="hdr" style="display:none">
  <div class="header-top">
    <div class="app-title">📋 Contacts</div>
    <div style="display:flex;gap:8px;align-items:center">
      <span class="contact-count" id="badge">0 contacts</span>
      <button class="refresh-btn" id="rfBtn" onclick="doRefresh()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
      </button>
    </div>
  </div>
  <div class="search-wrap">
    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="search-input" id="srch" type="search" placeholder="Search name, phone, profession…" oninput="doFilter()" />
  </div>
</div>
<div class="filter-row" id="frow" style="display:none"></div>
<div class="content" id="main"><div class="loader"><div class="spinner"></div><p>Connecting…</p></div></div>

<script>
  // ── CONFIG ──────────────────────────────────────────────
  var API = 'https://script.google.com/macros/s/AKfycbzAuT6a0BF7KCoYwGJFYxEyEWNoN8QdJUFXMmx6xvgCwL2gKi_plmCtr_U9E5U3zF8/exec ';

  var all = [], shown = [], activeF = 'All';
  var COLORS = [
    ['#4f46e5','#7c3aed'],['#0891b2','#0e7490'],['#059669','#047857'],
    ['#d97706','#b45309'],['#dc2626','#b91c1c'],['#7c3aed','#6d28d9'],
    ['#0284c7','#0369a1'],['#16a34a','#15803d'],['#9333ea','#7e22ce']
  ];

  function avatarColor(n){var h=0;for(var i=0;i<n.length;i++)h=n.charCodeAt(i)+((h<<5)-h);return COLORS[Math.abs(h)%COLORS.length];}
  function initials(n){var p=n.trim().split(' ').filter(Boolean);return p.length===1?p[0][0].toUpperCase():(p[0][0]+p[p.length-1][0]).toUpperCase();}
  function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
  function setMain(h){document.getElementById('main').innerHTML=h;}
  function setLoader(t){setMain('<div class="loader"><div class="spinner"></div><p>'+t+'</p></div>');}

  // ── ON SUCCESS ──────────────────────────────────────────
  function onData(data){
    if(!data||!data.success||!Array.isArray(data.contacts)){
      showErr('Apps Script returned unexpected data. Ensure sheet columns are: Name, Phone, Email, Profession, Address','');
      return;
    }
    all=data.contacts; shown=all.slice();
    document.getElementById('hdr').style.display='block';
    document.getElementById('frow').style.display='flex';
    buildPills(); render();
  }
  // ── SERVICE WORKER ─────────────────────────────────────
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/Phonebook/sw.js').then(function(reg){
      console.log('✓ Service Worker registered');
    }).catch(function(err){
      console.log('✗ Service Worker registration failed:', err);
    });
  }
  
  // ── ERROR DISPLAY ───────────────────────────────────────
  function showErr(msg, debug){
    setMain(
      '<div class="error-box"><strong>⚠️ Could not load contacts</strong>'+msg+'<br><br>'+
      '<b>Check these settings in Apps Script:</b><br>'+
      '• Deploy → New Deployment → Web App<br>'+
      '• Execute as: <b>Me</b><br>'+
      '• Who has access: <b>Anyone</b> (NOT "Anyone with Google account")<br>'+
      '• URL must end in <b>/exec</b></div>'+
      (debug?'<div class="debug-log">'+esc(debug)+'</div>':'')+
      '<button class="retry-btn" onclick="boot()">↺ Retry</button>'
    );
  }

  // ── METHOD 1: XHR ──────────────────────────────────────
  function tryXHR(url, ok, fail){
    try{
      var x=new XMLHttpRequest();
      x.open('GET',url,true);
      x.timeout=15000;
      x.onreadystatechange=function(){
        if(x.readyState!==4)return;
        if(x.status===200){try{ok(JSON.parse(x.responseText));}catch(e){fail('XHR parse: '+e.message);}}
        else{fail('XHR status '+x.status);}
      };
      x.ontimeout=function(){fail('XHR timeout');};
      x.onerror=function(){fail('XHR onerror');};
      x.send();
    }catch(e){fail('XHR threw: '+e.message);}
  }

  // ── METHOD 2: FETCH ─────────────────────────────────────
  function tryFetch(url, ok, fail){
    if(typeof fetch==='undefined'){fail('fetch unavailable');return;}
    fetch(url,{method:'GET',mode:'cors',cache:'no-cache'})
      .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
      .then(ok).catch(function(e){fail('fetch: '+e.message);});
  }

  // ── METHOD 3: JSONP ─────────────────────────────────────
  function tryJSONP(url, ok, fail){
    var cb='__cb'+Date.now();
    var el=document.createElement('script');
    var t=setTimeout(function(){cleanup();fail('JSONP timeout');},15000);
    function cleanup(){clearTimeout(t);delete window[cb];if(el.parentNode)el.parentNode.removeChild(el);}
    window[cb]=function(d){cleanup();try{ok(d);}catch(e){fail('JSONP parse: '+e.message);}};
    el.src=url+'?callback='+cb+'&t='+Date.now();
    el.onerror=function(){cleanup();fail('JSONP script error');};
    document.head.appendChild(el);
  }

  // ── BOOT: try all 3 methods ─────────────────────────────
  var log=[];
  function boot(){
    log=[];
    setLoader('Connecting to Google Sheet…');
    tryXHR(API,
      function(d){log.push('XHR OK');onData(d);},
      function(e1){
        log.push('XHR failed: '+e1);
        setLoader('Trying fetch…');
        tryFetch(API,
          function(d){log.push('fetch OK');onData(d);},
          function(e2){
            log.push('fetch failed: '+e2);
            setLoader('Trying JSONP…');
            tryJSONP(API,
              function(d){log.push('JSONP OK');onData(d);},
              function(e3){
                log.push('JSONP failed: '+e3);
                showErr('All 3 connection methods failed.',log.join('\n'));
              }
            );
          }
        );
      }
    );
  }

  // ── REFRESH ─────────────────────────────────────────────
  function doRefresh(){
    var btn=document.getElementById('rfBtn');
    btn.classList.add('spinning');
    tryXHR(API,
      function(d){btn.classList.remove('spinning');if(d.success){all=d.contacts;buildPills();doFilter();}},
      function(){tryFetch(API,
        function(d){btn.classList.remove('spinning');if(d.success){all=d.contacts;buildPills();doFilter();}},
        function(){btn.classList.remove('spinning');}
      );}
    );
  }

  // ── FILTER PILLS ────────────────────────────────────────
  function buildPills(){
    var profs=[...new Set(all.map(function(c){return c['Profession']||c['profession']||'';}).filter(Boolean))];
    var row=document.getElementById('frow');
    row.innerHTML='';
    ['All'].concat(profs).forEach(function(p){
      var btn=document.createElement('button');
      btn.className='filter-pill'+(p==='All'?' active':'');
      btn.textContent=p;
      btn.onclick=function(){
        activeF=p;
        document.querySelectorAll('.filter-pill').forEach(function(x){x.classList.remove('active');});
        btn.classList.add('active');
        doFilter();
      };
      row.appendChild(btn);
    });
  }

  function doFilter(){
    var q=(document.getElementById('srch')?document.getElementById('srch').value||'':'').toLowerCase();
    shown=all.filter(function(c){
      var n=(c.Name||c.name||'').toLowerCase();
      var ph=(c.Phone||c.phone||c['Phone Number']||'').toLowerCase();
      var ph1=(c.Phone1||c.phone1||c['Alternate Phone Number']||'').toLowerCase();
      var em=(c.Email||c.email||'').toLowerCase();
      var pr=(c.Profession||c.profession||'').toLowerCase();
      var ad=(c.Address||c.address||'').toLowerCase();
      var ad1=(c.Address1||c.address1||'').toLowerCase();
      var ms=!q||[n,ph,em,pr,ad].some(function(v){return v.indexOf(q)>=0;});
      var mf=activeF==='All'||(c.Profession||c.profession||'')===activeF;
      return ms&&mf;
    });
    render();
  }

  // ── RENDER ──────────────────────────────────────────────
  function render(){
    var b=document.getElementById('badge');
    if(b)b.textContent=shown.length+' contact'+(shown.length!==1?'s':'');
    setMain('<div class="contacts-list" id="clist"></div>');
    var el=document.getElementById('clist');
    if(!shown.length){
      el.innerHTML='<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">No contacts found</div><div class="empty-desc">Try a different search term</div></div>';
      return;
    }
    el.innerHTML=shown.map(function(c,i){
      var n=c.Name||c.name||'Unknown';
      var ph=c.Phone||c.phone||c['Phone Number']||'';
      var ph1=c.Phone1||c.phone1||c['Alternate Phone Number']||'';
      var em=c.Email||c.email||'';
      var pr=c.Profession||c.profession||'';
      var ad=c.Address||c.address||'';
      var ad1=(c.Address1||c.address1||'';
      var col=avatarColor(n);
      return '<div class="contact-card" id="cd'+i+'">'+
        '<div class="card-main" onclick="tog('+i+')">'+
          '<div class="avatar" style="background:linear-gradient(135deg,'+col[0]+','+col[1]+')">'+initials(n)+'</div>'+
          '<div class="card-info"><div class="card-name">'+esc(n)+'</div><div class="card-sub">'+esc(pr||ph)+'</div></div>'+
          '<svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="m6 9 6 6 6-6"/></svg>'+
        '</div>'+
        '<div class="card-details">'+
          (ph?'<div class="drow"><div class="dicon" style="background:rgba(34,211,165,0.12)">📞</div><div class="dcontent"><div class="dlabel">Phone</div><div class="dvalue">'+esc(ph)+'</div></div><a href="tel:'+esc(ph)+'" class="abtn abtn-call">📞</a></div>':'')+
          (em?'<div class="drow"><div class="dicon" style="background:rgba(79,142,247,0.12)">✉️</div><div class="dcontent"><div class="dlabel">Email</div><div class="dvalue">'+esc(em)+'</div></div><a href="mailto:'+esc(em)+'" class="abtn abtn-email">✉️</a></div>':'')+
          (pr?'<div class="drow"><div class="dicon" style="background:rgba(167,139,250,0.12)">💼</div><div class="dcontent"><div class="dlabel">Profession</div><div class="dvalue">'+esc(pr)+'</div></div></div>':'')+
          (ad?'<div class="drow"><div class="dicon" style="background:rgba(251,191,36,0.12)">📍</div><div class="dcontent"><div class="dlabel">Address</div><div class="dvalue" style="white-space:normal;font-size:13px">'+esc(ad)+'</div></div></div>':'')+
          ((ph||em)?'<div class="qactions">'+
            (ph?'<a href="tel:'+esc(ph)+'" class="qbtn qbtn-call">📞 Call</a>':'')+
            (em?'<a href="mailto:'+esc(em)+'" class="qbtn qbtn-email">✉️ Email</a>':'')+
          '</div>':'')+
        '</div></div>';
    }).join('');
  }

  function tog(i){document.getElementById('cd'+i).classList.toggle('open');}

  // ── START ────────────────────────────────────────────────
  window.onload=boot;
</script>
</body>
</html>
